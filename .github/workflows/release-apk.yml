name: Build and Release APK

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode Android keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not set"
            exit 1
          fi
          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "ANDROID_KEYSTORE_PASSWORD is not set"
            exit 1
          fi
          if [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "ANDROID_KEY_ALIAS is not set"
            exit 1
          fi
          if [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "ANDROID_KEY_PASSWORD is not set"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/kudo-release.keystore"

      - name: Build signed release APK
        env:
          KUDO_RELEASE_STORE_FILE: ${{ runner.temp }}/kudo-release.keystore
          KUDO_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KUDO_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KUDO_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean assembleRelease

      - name: Rename APK for release
        shell: bash
        run: |
          APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name 'app-release*.apk' | head -n 1)"
          if [ ! -f "$APK_PATH" ]; then
            echo "Release APK not found under app/build/outputs/apk/release"
            find app/build/outputs/apk/release -maxdepth 2 -type f
            exit 1
          fi
          cp "$APK_PATH" "app/build/outputs/apk/release/Kudo-${GITHUB_REF_NAME}.apk"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: app/build/outputs/apk/release/Kudo-${{ github.ref_name }}.apk
